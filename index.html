<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV Builder | ATS + Personal</title>
    <meta
      name="description"
      content="Crea CVs en formato ATS de 1 columna o formato personal de 2 columnas desde la misma informacion."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Lora:wght@400;500;700&family=Manrope:wght@400;500;700;800&family=Merriweather:wght@400;700&family=Montserrat:wght@400;500;700;800&family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@500;700&family=Poppins:wght@400;500;700;800&family=Roboto+Slab:wght@400;600;700&family=Source+Sans+3:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/cv.css" />
  </head>
  <body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero">
        <p class="hero-kicker">CV Builder</p>
        <h1>Una sola carga, dos formatos de CV</h1>
        <p>
          Completa tus datos, elegi diseno ATS (1 columna) o personal (2 columnas), y
          genera un CV listo para postular.
        </p>
      </header>

      <section class="panel form-panel">
        <h2>Datos del CV</h2>

        <form id="cvForm" autocomplete="on">
          <div class="field-grid two">
            <label>
              Nombre completo
              <input name="fullName" required placeholder="Nombre Apellido" />
            </label>
            <label>
              Titular profesional
              <input name="headline" required placeholder="Data Analyst | BI | SQL" />
            </label>
          </div>

          <div class="field-grid three">
            <label>
              Ciudad
              <input name="city" placeholder="Buenos Aires" />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="correo@dominio.com" />
            </label>
            <label>
              Telefono
              <input name="phone" placeholder="+54 11..." />
            </label>
          </div>

          <div class="field-grid one">
            <label>
              LinkedIn
              <input name="linkedin" placeholder="https://www.linkedin.com/in/..." />
            </label>
          </div>

          <div class="field-grid one">
            <label>
              Resumen profesional
              <textarea
                name="summary"
                rows="4"
                placeholder="3 a 5 lineas con experiencia, foco y resultados medibles"
              ></textarea>
            </label>
          </div>

          <div class="field-grid one">
            <label>
              Habilidades (separadas por coma)
              <input
                name="skills"
                placeholder="SQL, Power BI, Python, Excel, KPIs"
              />
            </label>
          </div>

          <section class="repeat-section">
            <div class="repeat-head">
              <h3>Experiencia</h3>
              <button type="button" id="addExperience" class="ghost-btn">+ Agregar experiencia</button>
            </div>
            <div id="experienceList"></div>
          </section>

          <section class="repeat-section">
            <div class="repeat-head">
              <h3>Educacion</h3>
              <button type="button" id="addEducation" class="ghost-btn">+ Agregar educacion</button>
            </div>
            <div id="educationList"></div>
          </section>

          <section class="repeat-section">
            <div class="repeat-head">
              <h3>Idiomas</h3>
              <button type="button" id="addLanguage" class="ghost-btn">+ Agregar idioma</button>
            </div>
            <div id="languageList"></div>
          </section>

          <section class="repeat-section">
            <div class="repeat-head">
              <h3>Chequeo ATS rapido</h3>
            </div>
            <label>
              Keywords del aviso (separadas por coma)
              <input
                name="jobKeywords"
                placeholder="SQL, ETL, dashboard, analisis, python"
              />
            </label>
            <p id="atsHint" class="hint"></p>
          </section>

          <section class="controls">
            <div class="field-grid one">
              <label>
                Tipografia del CV
                <select name="fontPreset">
                  <option value="manrope" selected>Manrope (moderna limpia)</option>
                  <option value="montserrat">Montserrat (corporativa)</option>
                  <option value="poppins">Poppins (redondeada actual)</option>
                  <option value="sourceSans">Source Sans 3 (profesional)</option>
                  <option value="nunito">Nunito (amigable)</option>
                  <option value="firaSans">Fira Sans (tecnica clara)</option>
                  <option value="merriweather">Merriweather (serif clasica)</option>
                  <option value="lora">Lora (serif editorial)</option>
                  <option value="robotoSlab">Roboto Slab (slab formal)</option>
                  <option value="playfair">Playfair Display (elegante)</option>
                </select>
              </label>
            </div>

            <div class="layout-pick">
              <p>Formato</p>
              <label><input type="radio" name="layout" value="ats" checked /> ATS (1 columna)</label>
              <label><input type="radio" name="layout" value="personal" /> Personal (2 columnas)</label>
            </div>

            <div class="action-row">
              <button type="submit" class="primary-btn">Generar CV</button>
              <button type="button" id="saveDraft" class="ghost-btn">Guardar borrador</button>
              <button type="button" id="downloadHtml" class="ghost-btn">Descargar HTML</button>
              <button type="button" id="printPdf" class="ghost-btn">Imprimir / PDF</button>
            </div>
            <p id="saveStatus" class="save-status" aria-live="polite">Sin cambios guardados aun.</p>
          </section>
        </form>
      </section>

      <section class="panel preview-panel">
        <div class="preview-head">
          <h2>Vista previa</h2>
          <p id="previewMeta">Formato actual: ATS</p>
        </div>
        <article id="cvPreview" class="cv-template cv-ats"></article>
      </section>
    </main>

    <template id="experienceTemplate">
      <article class="repeat-card experience-item">
        <div class="repeat-top">
          <h4>Experiencia</h4>
          <button type="button" class="remove-btn">Quitar</button>
        </div>
        <div class="field-grid two">
          <label>Puesto<input data-field="role" required /></label>
          <label>Empresa<input data-field="company" required /></label>
        </div>
        <div class="field-grid three">
          <label>Ubicacion<input data-field="location" /></label>
          <label>Inicio<input data-field="start" placeholder="Mar 2022" /></label>
          <label>Fin<input data-field="end" placeholder="Actual" /></label>
        </div>
        <label>Logros (una linea por punto)
          <textarea data-field="bullets" rows="4" placeholder="Aumente X%...&#10;Reduje Y horas..."></textarea>
        </label>
      </article>
    </template>

    <template id="educationTemplate">
      <article class="repeat-card education-item">
        <div class="repeat-top">
          <h4>Educacion</h4>
          <button type="button" class="remove-btn">Quitar</button>
        </div>
        <div class="field-grid two">
          <label>Titulo<input data-field="degree" required /></label>
          <label>Institucion<input data-field="institution" required /></label>
        </div>
        <div class="field-grid two">
          <label>Inicio<input data-field="start" placeholder="2018" /></label>
          <label>Fin<input data-field="end" placeholder="2022" /></label>
        </div>
      </article>
    </template>

    <template id="languageTemplate">
      <article class="repeat-card language-item">
        <div class="repeat-top">
          <h4>Idioma</h4>
          <button type="button" class="remove-btn">Quitar</button>
        </div>
        <div class="field-grid two">
          <label>Idioma<input data-field="name" required /></label>
          <label>Nivel<input data-field="level" placeholder="B2 / Nativo" /></label>
        </div>
      </article>
    </template>

    <script src="scripts/app.js"></script>
  </body>
</html>
